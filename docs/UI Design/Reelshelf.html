<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reelshelf — your game clips, kept</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    /* Light theme — warm, cozy */
    --bg: oklch(0.97 0.012 80);
    --bg-soft: oklch(0.94 0.014 80);
    --fg: oklch(0.22 0.015 60);
    --fg-soft: oklch(0.48 0.020 60);
    --line: oklch(0.88 0.014 75);
    --track-bg: oklch(0.86 0.014 75);
    --accent: oklch(0.58 0.09 145);
    --accent-ink: oklch(0.42 0.09 145);
  }

  [data-theme="dark"] {
    --dark-hue: 105;
    --bg: oklch(0.19 0.013 var(--dark-hue));
    --bg-soft: oklch(0.23 0.014 var(--dark-hue));
    --fg: oklch(0.94 0.012 var(--dark-hue));
    --fg-soft: oklch(0.69 0.018 var(--dark-hue));
    --line: oklch(0.31 0.014 var(--dark-hue));
    --track-bg: oklch(0.33 0.014 var(--dark-hue));
    --accent: oklch(0.71 0.10 145);
    --accent-ink: oklch(0.86 0.08 145);
  }

  /* Hide scrollbars on horizontal lists */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-soft); }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#2a251f">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#2a251f"/>
    <g transform="translate(540 340)">
      <rect width="120" height="120" rx="28" fill="#8fb37a"/>
      <path d="M44 32 L92 60 L44 88 Z" fill="#fff"/>
    </g>
    <text x="600" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-style="italic" fill="#f0e8d8">Reelshelf</text>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel" src="bulk-upload.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#6b8e5a",
    "cardStyle": "filmstrip",
    "dark": false,
    "darkHue": 70
  }/*EDITMODE-END*/;

  // ── App: routed prototype ──────────────────────────────────────────
  // Starts on the landing page; "Continue with Discord" flips authed=true
  // and drops the user into the library. Logging out (or starting a fresh
  // artboard) returns them to the landing page.
  function ClipsApp({ tweaks, startAuthed = false, startRoute }) {
    const [authed, setAuthed] = React.useState(startAuthed);
    const [route, setRoute] = React.useState(startRoute || { page: 'library' });

    React.useEffect(() => {
      document.documentElement.dataset.theme = tweaks.dark ? 'dark' : 'light';
      document.documentElement.style.setProperty('--accent', tweaks.accent);
      document.documentElement.style.setProperty('--dark-hue', tweaks.darkHue);
    }, [tweaks.dark, tweaks.accent, tweaks.darkHue]);

    if (!authed) return <Landing onLogin={() => setAuthed(true)} />;

    return (
      <Shell route={route} onNav={setRoute} onUpload={() => setRoute({ page: 'upload' })}>
        {route.page === 'library' && <LibraryHome onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'collections' && <CollectionsPage onNav={setRoute} />}
        {route.page === 'game' && <GamePage gameId={route.game} onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'clip' && <ClipPlayer clipId={route.clip} onNav={setRoute} />}
        {route.page === 'upload' && <UploadFlow onNav={setRoute} />}
      </Shell>
    );
  }

  // ── Top-level: design canvas wrapping main prototype + alts ─────────
  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

    return (
      <>
        <DesignCanvas>
          <DCSection id="main" title="Reelshelf — main direction" subtitle="Soft, cozy, library-first. Click any artboard's expand icon to view fullscreen.">
            <DCArtboard id="landing" label="Landing (logged out)" width={1280} height={1280}>
              <ClipsApp tweaks={tweaks} />
            </DCArtboard>
            <DCArtboard id="library" label="Library home" width={1280} height={900}>
              <ClipsApp tweaks={tweaks} startAuthed={true} />
            </DCArtboard>
            <DCArtboard id="game" label="Game page" width={1280} height={900}>
              <GamePageStandalone tweaks={tweaks} />
            </DCArtboard>
            <DCArtboard id="clip" label="Clip player" width={1280} height={1020}>
              <ClipPlayerStandalone tweaks={tweaks} />
            </DCArtboard>
            <DCArtboard id="collections" label="Collections" width={1280} height={900}>
              <CollectionsStandalone tweaks={tweaks} />
            </DCArtboard>
            <DCArtboard id="upload" label="Upload flow" width={1280} height={900}>
              <UploadStandalone tweaks={tweaks} />
            </DCArtboard>
          </DCSection>

          <DCSection id="bulk-upload" title="Bulk upload — queue table" subtitle="Drop a session of clips at once. Auto-detection per row, session sub-headers, saved Macros, sticky action bar and per-row hover actions.">
            <DCArtboard id="bulk-drop" label="Entry · drop on library" width={1280} height={900}>
              <LibraryDropStandalone tweaks={tweaks} />
            </DCArtboard>
            <DCArtboard id="bulk-queue" label="Queue · grouped + macros" width={1280} height={1400}>
              <BulkQueueStandalone tweaks={tweaks} />
            </DCArtboard>
          </DCSection>

        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Theme">
            <TweakColor label="Accent color" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />
            <TweakToggle label="Dark mode" value={tweaks.dark} onChange={(v) => setTweak('dark', v)} />
            <TweakSlider label="Dark hue" value={tweaks.darkHue} min={0} max={360} step={1} unit="°"
              onChange={(v) => setTweak('darkHue', v)} />
          </TweakSection>
          <TweakSection label="Library cards">
            <TweakRadio label="Card style" value={tweaks.cardStyle}
              options={['poster', 'grid', 'filmstrip']}
              onChange={(v) => setTweak('cardStyle', v)} />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  // Standalone page mounts so each artboard shows the right starting screen.
  // Each shares the same theme via tweaks but holds its own inner-route.
  function GamePageStandalone({ tweaks }) {
    const [route, setRoute] = React.useState({ page: 'game', game: 'valorant' });
    React.useEffect(() => {
      document.documentElement.dataset.theme = tweaks.dark ? 'dark' : 'light';
      document.documentElement.style.setProperty('--accent', tweaks.accent);
    }, [tweaks]);
    return (
      <Shell route={route} onNav={setRoute} onUpload={() => setRoute({ page: 'upload' })} >
        {route.page === 'library' && <LibraryHome onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'game' && <GamePage gameId={route.game} onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'clip' && <ClipPlayer clipId={route.clip} onNav={setRoute} />}
        {route.page === 'upload' && <UploadFlow onNav={setRoute} />}
        {route.page === 'collections' && <CollectionsPage onNav={setRoute} />}
      </Shell>
    );
  }
  function ClipPlayerStandalone({ tweaks }) {
    const [route, setRoute] = React.useState({ page: 'clip', clip: 'c01' });
    return (
      <Shell route={route} onNav={setRoute} onUpload={() => setRoute({ page: 'upload' })}>
        {route.page === 'library' && <LibraryHome onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'game' && <GamePage gameId={route.game} onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'clip' && <ClipPlayer clipId={route.clip} onNav={setRoute} />}
        {route.page === 'upload' && <UploadFlow onNav={setRoute} />}
        {route.page === 'collections' && <CollectionsPage onNav={setRoute} />}
      </Shell>
    );
  }
  function CollectionsStandalone({ tweaks }) {
    const [route, setRoute] = React.useState({ page: 'collections' });
    return (
      <Shell route={route} onNav={setRoute} onUpload={() => setRoute({ page: 'upload' })}>
        {route.page === 'library' && <LibraryHome onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'collections' && <CollectionsPage onNav={setRoute} />}
        {route.page === 'game' && <GamePage gameId={route.game} onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'clip' && <ClipPlayer clipId={route.clip} onNav={setRoute} />}
        {route.page === 'upload' && <UploadFlow onNav={setRoute} />}
      </Shell>
    );
  }
  function UploadStandalone({ tweaks }) {
    const [route, setRoute] = React.useState({ page: 'upload' });
    return (
      <Shell route={route} onNav={setRoute} onUpload={() => setRoute({ page: 'upload' })}>
        {route.page === 'library' && <LibraryHome onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'collections' && <CollectionsPage onNav={setRoute} />}
        {route.page === 'game' && <GamePage gameId={route.game} onNav={setRoute} cardStyle={tweaks.cardStyle} />}
        {route.page === 'clip' && <ClipPlayer clipId={route.clip} onNav={setRoute} />}
        {route.page === 'upload' && <UploadFlow onNav={setRoute} />}
      </Shell>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
