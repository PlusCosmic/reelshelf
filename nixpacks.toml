[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
# Use turbo to build with proper dependency ordering (builds @repo/* packages first)
cmds = ["pnpm turbo run build --filter=${NIXPACKS_APP}"]

[staticAssets]
directory = "apps/${NIXPACKS_APP}/dist"
