name: Publish Application Images

on:
  push:
    branches:
      - main
    paths:
      - 'services/clips/**'
      - 'services/minecraft/**'
      - 'packages/nucleus-shared/**'
      - 'packages/nucleus-api-client/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - '.github/workflows/publish-app-images.yml'
  workflow_dispatch:
    inputs:
      service:
        description: Service to build
        required: true
        default: both
        type: choice
        options:
          - both
          - clips
          - minecraft-panel

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      clips: ${{ steps.filter.outputs.clips }}
      minecraft_panel: ${{ steps.filter.outputs.minecraft_panel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.service }}" in
              both)
                echo "clips=true" >> "$GITHUB_OUTPUT"
                echo "minecraft_panel=true" >> "$GITHUB_OUTPUT"
                ;;
              clips)
                echo "clips=true" >> "$GITHUB_OUTPUT"
                echo "minecraft_panel=false" >> "$GITHUB_OUTPUT"
                ;;
              minecraft-panel)
                echo "clips=false" >> "$GITHUB_OUTPUT"
                echo "minecraft_panel=true" >> "$GITHUB_OUTPUT"
                ;;
            esac
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ "$before" =~ ^0+$ ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          else
            changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
          fi

          clips=false
          minecraft_panel=false

          if grep -Eq '^(services/clips/|packages/nucleus-shared/|packages/nucleus-api-client/|packages/shared/|package.json|bun.lock|turbo.json|\.github/workflows/publish-app-images\.yml)' <<< "$changed_files"; then
            clips=true
          fi

          if grep -Eq '^(services/minecraft/|packages/nucleus-shared/|packages/nucleus-api-client/|packages/shared/|package.json|bun.lock|turbo.json|\.github/workflows/publish-app-images\.yml)' <<< "$changed_files"; then
            minecraft_panel=true
          fi

          echo "clips=${clips}" >> "$GITHUB_OUTPUT"
          echo "minecraft_panel=${minecraft_panel}" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.clips == 'true' || needs.detect.outputs.minecraft_panel == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: clips
            dockerfile: services/clips/Dockerfile
            image: ghcr.io/pluscosmic/clips
            compose_file: services/clips.yml
          - service: minecraft-panel
            dockerfile: services/minecraft/Dockerfile
            image: ghcr.io/pluscosmic/minecraft-panel
            compose_file: services/minecraft-panel.yml
    steps:
      - name: Decide whether to build
        id: should_build
        shell: bash
        run: |
          enabled=false
          if [[ "${{ matrix.service }}" == "clips" && "${{ needs.detect.outputs.clips }}" == "true" ]]; then
            enabled=true
          fi
          if [[ "${{ matrix.service }}" == "minecraft-panel" && "${{ needs.detect.outputs.minecraft_panel }}" == "true" ]]; then
            enabled=true
          fi
          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"

      - name: Checkout app repo
        if: steps.should_build.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.should_build.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.should_build.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.should_build.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Checkout infrastructure repo
        if: steps.should_build.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: PlusCosmic/infrastructure
          token: ${{ secrets.INFRASTRUCTURE_PR_TOKEN }}
          path: infrastructure

      - name: Bump compose image tag
        if: steps.should_build.outputs.enabled == 'true'
        working-directory: infrastructure
        shell: bash
        run: |
          image="${{ matrix.image }}:sha-${{ github.sha }}"
          compose_file="${{ matrix.compose_file }}"
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          compose_file = Path(os.environ["COMPOSE_FILE"])
          image = os.environ["IMAGE"]
          text = compose_file.read_text()

          pattern = re.compile(r"(image:\s*['\"]?)ghcr\.io/pluscosmic/(clips|minecraft-panel):[^'\"\s]+(['\"]?)")
          updated, count = pattern.subn(rf"\1{image}\3", text, count=1)

          if count != 1:
              raise SystemExit(f"Expected to update one image reference in {compose_file}, updated {count}")

          compose_file.write_text(updated)
          PY
        env:
          COMPOSE_FILE: ${{ matrix.compose_file }}
          IMAGE: ${{ matrix.image }}:sha-${{ github.sha }}

      - name: Create infrastructure PR
        if: steps.should_build.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          path: infrastructure
          token: ${{ secrets.INFRASTRUCTURE_PR_TOKEN }}
          branch: automation/${{ matrix.service }}-${{ github.sha }}
          delete-branch: true
          commit-message: Bump ${{ matrix.service }} image to sha-${{ github.sha }}
          title: Bump ${{ matrix.service }} image to sha-${{ github.sha }}
          body: |
            Updates `${{ matrix.compose_file }}` to deploy:

            `${{ matrix.image }}:sha-${{ github.sha }}`

            Built from `${{ github.repository }}` commit `${{ github.sha }}`.
