name: Publish Application Images

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'migrations/**'
      - 'Dockerfile'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/publish-app-images.yml'
  workflow_dispatch:
    inputs:
      service:
        description: Service image set to build
        required: true
        default: both
        type: choice
        options:
          - both
          - clips
          - migrations

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      clips: ${{ steps.filter.outputs.clips }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.service }}" in
              both)
                echo "clips=true" >> "$GITHUB_OUTPUT"
                echo "migrations=true" >> "$GITHUB_OUTPUT"
                ;;
              clips)
                echo "clips=true" >> "$GITHUB_OUTPUT"
                echo "migrations=true" >> "$GITHUB_OUTPUT"
                ;;
              migrations)
                echo "clips=false" >> "$GITHUB_OUTPUT"
                echo "migrations=true" >> "$GITHUB_OUTPUT"
                ;;
            esac
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ "$before" =~ ^0+$ ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          else
            changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
          fi

          clips=false
          migrations=false

          if grep -Eq '^(api/|frontend/|migrations/|Dockerfile|package.json|bun.lock|\.github/workflows/publish-app-images\.yml)' <<< "$changed_files"; then
            clips=true
          fi

          if grep -Eq '^(migrations/|package.json|\.github/workflows/publish-app-images\.yml)' <<< "$changed_files"; then
            migrations=true
          fi

          echo "clips=${clips}" >> "$GITHUB_OUTPUT"
          echo "migrations=${migrations}" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.clips == 'true' || needs.detect.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: clips
            dockerfile: Dockerfile
            image: ghcr.io/pluscosmic/reelshelf
            compose_file: services/clips.yml
            compose_image: clips
          - service: migrations
            dockerfile: migrations/Dockerfile
            image: ghcr.io/pluscosmic/reelshelf-migrations
            compose_file: services/clips.yml
            compose_image: nucleus-migrations
    steps:
      - name: Decide whether to build
        id: should_build
        shell: bash
        run: |
          enabled=false
          if [[ "${{ matrix.service }}" == "clips" && "${{ needs.detect.outputs.clips }}" == "true" ]]; then
            enabled=true
          fi
          if [[ "${{ matrix.service }}" == "migrations" && "${{ needs.detect.outputs.migrations }}" == "true" ]]; then
            enabled=true
          fi
          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"

      - name: Checkout app repo
        if: steps.should_build.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.should_build.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.should_build.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.should_build.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  bump-infrastructure:
    needs:
      - detect
      - build
    if: needs.detect.outputs.clips == 'true' || needs.detect.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: PlusCosmic/infrastructure
          token: ${{ secrets.INFRASTRUCTURE_PR_TOKEN }}
          path: infrastructure

      - name: Bump compose image tags
        working-directory: infrastructure
        shell: bash
        env:
          SHA: ${{ github.sha }}
          BUMP_CLIPS: ${{ needs.detect.outputs.clips }}
          BUMP_MIGRATIONS: ${{ needs.detect.outputs.migrations }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          sha = os.environ["SHA"]
          bumps = []

          if os.environ["BUMP_CLIPS"] == "true":
              bumps.append(("services/clips.yml", ("clips", "reelshelf"), f"ghcr.io/pluscosmic/reelshelf:sha-{sha}"))

          if os.environ["BUMP_MIGRATIONS"] == "true":
              bumps.append(("services/clips.yml", ("nucleus-migrations", "reelshelf-migrations"), f"ghcr.io/pluscosmic/reelshelf-migrations:sha-{sha}"))

          for compose_file_name, image_names, image in bumps:
              compose_file = Path(compose_file_name)
              text = compose_file.read_text()
              image_pattern = "|".join(re.escape(image_name) for image_name in image_names)
              pattern = re.compile(
                  rf"(image:\s*['\"]?)ghcr\.io/pluscosmic/(?:{image_pattern}):[^'\"\s]+(['\"]?)"
              )
              updated, count = pattern.subn(rf"\1{image}\2", text, count=1)

              if count != 1:
                  raise SystemExit(f"Expected to update one of {image_names} in {compose_file}, updated {count}")

              compose_file.write_text(updated)
          PY

      - name: Create infrastructure PR
        uses: peter-evans/create-pull-request@v8
        with:
          path: infrastructure
          token: ${{ secrets.INFRASTRUCTURE_PR_TOKEN }}
          branch: automation/app-images-${{ github.sha }}
          delete-branch: true
          commit-message: Bump app images to sha-${{ github.sha }}
          title: Bump app images to sha-${{ github.sha }}
          body: |
            Updates application image tags for `${{ github.sha }}`.

            Built from `${{ github.repository }}` commit `${{ github.sha }}`.
